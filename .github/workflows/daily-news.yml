name: Daily News to LINE

on:
  schedule:
    # UTC 22:00 = JST 7:00 (毎朝7時に配信)
    - cron: "0 22 * * *"
  workflow_dispatch: {}  # 手動実行もできるようにしておく(テスト用)

permissions:
  contents: write  # news.jsonをコミットするために必要

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: ニュース取得&LINE送信を実行
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python fetch_news.py

      - name: news.jsonをコミット(Web版更新用)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/news.json
          git diff --quiet --cached || git commit -m "Update news.json"
          git push
